<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./task.css" />
  </head>
  <body>
    <div class="box">
      <div class="task">
        <h2 class="task__head">List of tasks</h2>
        <div class="task__box">
          <input class="task__input" type="text" placeholder="enter task" />
          <button class="task__btm__add" type="submit">to add</button>
        </div>
        <div class="task_filters">
          <button class="task_filters_btn" data-filter="all">All</button>
          <button class="task_filters_btn" data-filter="active">Active</button>
          <button class="task_filters_btn" data-filter="completed">
            Completed
          </button>
        </div>
        <div class="empty_message"></div>
        <ul class="task__ul"></ul>
      </div>
    </div>
  </body>

  <script src="./task.js"></script>
</html>
